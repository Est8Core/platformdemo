    <div class="flex flex-col items-center gap-3">
      <button @click="resend()" :disabled="secs > 0" class="inline-flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-semibold border border-neutral-200 text-neutral-700 hover:bg-neutral-50 transition disabled:opacity-40 disabled:cursor-not-allowed">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 8a6 6 0 11-1.8-4.3M14 2v3.5h-3.5"/></svg>
        <span x-text="secs > 0 ? `إعادة الإرسال خلال ${secs} ثانية` : 'إعادة إرسال الرابط'"></span>
      </button>
      <p class="text-xs text-neutral-400 leading-relaxed">لم يصلك البريد؟ تحقّق من مجلد <strong>الرسائل المزعجة</strong> (Spam).</p>
    </div>

    <div class="flex items-center justify-center gap-2 text-sm text-neutral-500 pt-2 border-t border-neutral-100">
      <span>أدخلت بريداً خاطئاً؟</span>
      <a href="register.html" class="text-primary-700 font-semibold hover:text-accent-600 transition">العودة للتسجيل</a>
    </div>
  </div>

  <script>
    function verify() {
      return {
        secs: 60, timer: null,
        arm() {
          clearInterval(this.timer); this.secs = 60;
          this.timer = setInterval(() => { if (this.secs > 0) this.secs--; else clearInterval(this.timer); }, 1000);
        },
        resend() { if (this.secs === 0) { console.log('POST /api/v1/auth/resend-verification'); this.arm(); } },
      };
    }
  </script>
</body>
</html>
